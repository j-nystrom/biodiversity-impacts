# To create a new environment with all depencencies, run:
# conda env create -f env.yaml
# To update an existing environment with new dependencies, run:
# conda env update -n <env_name> -f env.yml
# Add --prune to the command above to remove any existing dependencies for a
# cleaner installation

name: bio_impact
channels:
  - conda-forge
  - defaults

dependencies:
  # -----------------------
  # Core
  # -----------------------
  - python=3.11

  # Data & array stack
  - numpy
  - pandas
  - polars=1.15  # Newer versions make pickle files incompatible
  - pyarrow
  - libopenblas

  # Plotting
  - matplotlib
  - seaborn

  # -----------------------
  # Geospatial
  # -----------------------
  - geopandas
  - rasterio
  - shapely
  - pygeoprocessing
  - rasterstats
  - utm

  # -----------------------
  # Modelling
  # -----------------------
  - scikit-learn
  - pymc=5.21
  - pytensor
  - numpyro
  - jax
  - jaxlib

  # -----------------------
  # Dev tools / linting
  # -----------------------
  - black
  - flake8
  - flake8-docstrings
  - flake8-rst-docstrings
  - pep8-naming
  - autopep8
  - isort
  - pyupgrade
  - mypy
  - types-pyyaml
  - pre-commit

  # -----------------------
  # Notebooks
  # -----------------------
  - jupyter
  - ipykernel
  - jupyter-black

  # -----------------------
  # Other utilities
  # -----------------------
  - python-box
  - dill
  - wakepy

  # Pip (empty unless needed later)
  - pip
  - pip:
      [gower]
