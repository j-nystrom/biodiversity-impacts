
# Configuration file for the Tasks and methods in the model pipeline(s)
# This includes all the scripts in the 'model' folder and subfolders

# Data type and scope --------------------------------------

data_scope:
  diversity_type: alpha  # [alpha, beta]
  sample_fraction: 1.0  # Fraction of data to use for train / CV, for scaling tests
  biogeographic:  # Biogeographic scope on which to train model
    include_all: True  # True if global scope, False if non-global
    filtering_logic: include  # Either include or exclude biomes listed below
    filtering_dicts:  # Only applicable if global is False
      Biome:  # Include / exclude the following biomes
        #- Tropical & Subtropical Moist Broadleaf Forests
        #- Tropical & Subtropical Dry Broadleaf Forests
        #- Tropical & Subtropical Coniferous Forests
        #- Temperate Broadleaf & Mixed Forests
        #- Tropical & Subtropical Grasslands, Savannas & Shrubland
        #- Mediterranean Forests, Woodlands & Shrubs
      Realm:
        #- Neotropic
        #- Indo-Malay
        #- Afrotropic

  taxonomic:  # Taxonomic scope on which to train model
    include_all: True  # True if all species in scope, False if not
    resolution: All_species  # Determines scope and possible granularity of filtering
    # [All_species, Custom, Kingdom, Phylum, Class, Order]
    filtering_logic: include
    filtering_dicts:  # Can only filter down to the resolution specified above
      All_species: []  # No need to specify groups for 'All_species'
      Kingdom:  # Include / exclude the following species groups
        - Animalia
        - Plantae
        - Fungi
      Phylum: []  # Must be specified if building a model at these levels
      Class: []
      Order: []
      Family: []

  # NOTE: These settings are perhaps obsolete given current cross-validation setup
  group_size_threshold: 0  # If 0 there is no threshold on the size of groups below
  threshold_on_groups: [Biome, Realm, Ecoregion]  # Only relevant if > 0


# Run and model structure settings --------------------------------------

run_settings:
  change_pred_approx: False  # Approx performance when predicting changes in land use
  model_type: bayesian  # [bayesian, lmm, random_forest]
  model_variables: bayesian_thesis_ref_model  # See below for model configurations
  # bayesian_thesis_ref_model, bii_ref_alpha, simplified_model

  # Structural settings for Bayesian hierarchical models
  bayesian:
    hierarchical: True  # True if hierarchical, False if standard linear regression
    likelihood: gaussian  # [gaussian, beta]

    # These settings are only relevant if hierarchical is True
    hierarchical_levels: 2  # Number of hierarchical levels: [1, 2, 3]
    most_granular_slope_level: 2  # Lowest level at which varying slopes are estimated
    hierarchy:  # Columns that define hierarchy; levels below the number above ignored
      level_1: [Biome]  # e.g. [Biome, Realm]
      level_2: [Realm]  # e.g. [Custom_taxonomic_group]
      level_3: []

    prior_values:  # See model definition for where they are used
      intercept_hyperprior_mean: 0.5
      coef_prior_var: 0.1
      gaussian_noise: 0.1
      alpha_var_param: 2
      beta_var_param: 2

    sampler:  # Refer to PyMC documentation for all settings
      draws: 50
      tune: 50
      cores: 4
      chains: 4
      target_accept: 0.99
      nuts_sampler: numpyro  # [numpyro, pymc], numpyro is generally faster

  # Structural settings for linear mixed models
  lmm:
    random_effects_type: correlated  # [independent, correlated]
    study_effects:  # Random effects at the study level
      type: slope  # [intercept, slope]
      slopes:  # This must be a subset of covariates in the model_variables
      # TODO: Need two versions, for alpha and beta
        - Primary vegetation_Light use
        - Primary vegetation_Intense use
        - Secondary vegetation_Minimal use
        - Secondary vegetation_Light use
        - Secondary vegetation_Intense use
        - Cropland_Minimal use
        - Cropland_Light_Intense
        - Pasture_Minimal use
        - Pasture_Light_Intense
        - Urban_All uses

    block_effects:  # Random effects at the block level
      type: intercept  # [intercept, slope]
      slopes: []  # This is likely never relevant, due to strong overfitting

    solver:
      conf_int: Wald  # [boot, Wald]
      nsim: 100  # Number of simulations for bootstrapping (if conf_int is boot)
      summary: False  # Print summary of model fit and statistics
      REML: True  # Fit using restricted maximum likelihood

  # Structural settings for random forest model
  random_forest:
    taxonomic_resolution: All_species
    n_trees: 1000
    criterion: absolute_error  # [squared_error, absolute_error]
    min_samples_leaf: 20
    monotonic_constraints: null
    hierarchy:  # Used as categorical features in the model, not strictly hierarchical
      level_1: [Biome]
      level_2: [Realm]
      level_3: []


# Cross-validation settings --------------------------------------

cv_settings:
  random_seed: 42  # Seed for reproducibility
  k: 10  # Number of folds
  split_level: study  # [site, study]
  strategy: random  # [random, spatial, environmental]
  strata:  # Variable to stratify on
    - Biome  # Biome or null
    - Realm  # Realm or null
    - null  # Ecoregion, Custom_taxonomic_group or null
  min_studies_per_stratum: 10  # Strata are rolled up otherwise
  clustering_vars:
    spatial:  # For spatial cross-validation
      - Longitude
      - Latitude
    environmental:  # For environmental cross-validation
      - Annual_mean_temp_1km
      - Temp_seasonality_1km
      - Annual_precip_1km
      - Precip_seasonality_1km
      - Elevation_10km
      - Terrain_roughness_1km

  study_clustering_agg:  # Aggregation functions for clustering of studies
    Longitude: mean
    Latitude: mean
    Annual_mean_temp_1km: mean
    Temp_seasonality_1km: mean
    Annual_precip_1km: mean
    Precip_seasonality_1km: mean
    Elevation_10km: mean
    Terrain_roughness_1km: mean
    Stratum: first
    Fold_id: first


# Candidate model configurations --------------------------------------

# Alpha diversity --------------------------------------

model_variables:

  # BII reference model for alpha diversity, based on DePalma et al 2021
  bii_ref_alpha:
    response_var: Scaled_Geometric_mean_abundance  # Scaled_Total_abundance
    response_var_transform: null  # [adjust, sqrt, logit, null]
    requires_intensity_data: True
    categorical_vars:
      - Primary vegetation_Light use
      - Primary vegetation_Intense use
      - Secondary vegetation_Minimal use
      - Secondary vegetation_Light use
      - Secondary vegetation_Intense use
      - Cropland_Minimal use
      - Cropland_Light_Intense
      - Pasture_Minimal use
      - Pasture_Light_Intense
      - Urban_All uses
    continuous_vars:
      - Pop_density_1km_log
      - Road_density_50km_cbrt
      - Mean_pop_density_1km_log
    interaction_cols:
      - Pop_density_1km_log
      - Road_density_50km_cbrt

    # Pressure variables are set to zero for the reference prediction in the
    # application stage. Should be copy pasted from the lists above
    pressure_vars:
      - Primary vegetation_Light use
      - Primary vegetation_Intense use
      - Secondary vegetation_Minimal use
      - Secondary vegetation_Light use
      - Secondary vegetation_Intense use
      - Cropland_Minimal use
      - Cropland_Light use
      - Cropland_Intense use
      - Pasture_Minimal use
      - Pasture_Light use
      - Pasture_Intense use
      - Urban_All uses
      - Pop_density_1km_log
      - Road_density_50km_cbrt
      - Mean_pop_density_1km_log  # BII-specific, will get special treatment


  # Bayesian hierarchical reference model
  bayesian_thesis_ref_model:
    response_var: Scaled_Geometric_mean_abundance  # Scaled_Total_abundance
    response_var_transform: null  # [adjust, sqrt, logit, null]
    requires_intensity_data: True
    categorical_vars:
      - Primary vegetation_Light use
      - Primary vegetation_Intense use
      - Secondary vegetation_Minimal use
      - Secondary vegetation_Light use
      - Secondary vegetation_Intense use
      - Cropland_Minimal use
      - Cropland_Light use
      - Cropland_Intense use
      - Pasture_Minimal use
      - Pasture_Light use
      - Pasture_Intense use
      - Urban_All uses
    continuous_vars:
      - Pop_density_1km_log
      - Pop_density_50km_log
      - Road_density_1km_cbrt
      - Road_density_50km_cbrt
      - Annual_mean_temp_1km
      - Temp_seasonality_1km
      - Annual_precip_1km
      - Precip_seasonality_1km
      - Elevation_10km
      - Terrain_roughness_1km
    interaction_cols:
      - Pop_density_50km_log
      - Road_density_50km_cbrt

    pressure_vars:
      - Primary vegetation_Light use
      - Primary vegetation_Intense use
      - Secondary vegetation_Minimal use
      - Secondary vegetation_Light use
      - Secondary vegetation_Intense use
      - Cropland_Minimal use
      - Cropland_Light use
      - Cropland_Intense use
      - Pasture_Minimal use
      - Pasture_Light use
      - Pasture_Intense use
      - Urban_All uses
      - Pop_density_1km_log
      - Pop_density_50km_log
      - Road_density_1km_cbrt
      - Road_density_50km_cbrt

  # New simplified model
  alpha_baseline:
    response_var: Scaled_Total_abundance
    response_var_transform: null  # [adjust, sqrt, logit, null]
    requires_intensity_data: True
    categorical_vars:
      - Primary vegetation_Light use
      - Primary vegetation_Intense use
      - Secondary vegetation_Minimal use
      - Secondary vegetation_Light use
      - Secondary vegetation_Intense use
      - Cropland_Minimal use
      - Cropland_Light_Intense
      - Pasture_Minimal use
      - Pasture_Light_Intense
      - Urban_All uses
    continuous_vars:
      - Pop_density_1km_log
      - Pop_density_50km_log
      - Road_density_1km_cbrt
      - Road_density_50km_cbrt
      - Annual_mean_temp_1km
      - Temp_seasonality_1km
      - Annual_precip_1km
      - Precip_seasonality_1km
      - Elevation_10km
      - Terrain_roughness_1km
    interaction_cols: []

    pressure_vars:
      - Primary vegetation_Light use
      - Primary vegetation_Intense use
      - Secondary vegetation_Minimal use
      - Secondary vegetation_Light use
      - Secondary vegetation_Intense use
      - Cropland_Minimal use
      - Cropland_Light_Intense
      - Pasture_Minimal use
      - Pasture_Light_Intense
      - Urban_All uses
      - Pop_density_1km_log
      - Pop_density_50km_log
      - Road_density_1km_cbrt
      - Road_density_50km_cbrt


# Beta diversity -------------------

  # BII reference model for beta diversity, based on DePalma et al 2021
  bii_ref_beta:
    response_var: Bray_Curtis_score
    response_var_transform: logit  # [adjust, sqrt, logit, null]
    requires_intensity_data: True
    categorical_vars:
      - Primary vegetation_Minimal use  # Included since "other" site can be this
      - Primary vegetation_Light_Intense
      - Secondary vegetation_Minimal use
      - Secondary vegetation_Light_Intense
      - Cropland_All uses  # Simplified for this model (vs alpha)
      - Pasture_All uses
      - Urban_All uses
    continuous_vars:
      - Haversine_distance_log
      - Gower_distance_cbrt
      - Pop_density_1km_log
      - Road_density_50km_cbrt
      - Mean_pop_density_1km_log
      - Pop_density_1km_log_diff  # Differences between sites added
      - Road_density_50km_cbrt_diff
    interaction_cols:
      - Pop_density_1km_log
      - Road_density_50km_cbrt
      - Pop_density_1km_log_diff
      - Road_density_50km_cbrt_diff


# Data grouping variables -------------------

group_vars:
  basic:
    - SS
    - SSB
    - SSBS
  biogeographic:
    - Biome
    - Realm
    - Ecoregion
  taxonomic:
    All_species: []
    Custom: [Custom_taxonomic_group]
    Kingdom: [Kingdom]
    Phylum: [Kingdom, Phylum]
    Class: [Kingdom, Phylum, Class]
    Order: [Kingdom, Phylum, Class, Order]
    Family: [Kingdom, Phylum, Class, Order, Family]

