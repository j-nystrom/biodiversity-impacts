  - Longitude
  - Latitude
  - Country
  - UN_region
  - UN_subregion
  - Wilderness_area
  - Hotspot
  - Study_common_taxon
  - Rank_of_study_common_taxon
  - Sampling_method
  - Rescaled_sampling_effort
  - Predominant_land_use
  - Use_intensity
  - Habitat_patch_area_square_metres
  - Km_to_nearest_edge_of_habitat
  - Years_since_fragmentation_or_conversion
