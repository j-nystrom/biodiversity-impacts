glmm_alpha_train_25:
  dag: training
  overrides:
    data_scope:
      diversity_type: alpha
      min_sites_per_study: 25
      sub_sampling:
        fraction: 1.0
      taxonomic:
        resolution: All_species

    run_settings:
      model_type: glmm
      model_variables: glmm_alpha
      glmm:
        study_effects:
          type: slope
        block_effects:
          type: intercept
